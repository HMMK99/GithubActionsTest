name: Daily Python Job

on:
  schedule:
    # This runs at 00:00 UTC every day (Cron syntax)
    - cron: '15 0 * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python and Cache dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # <--- This saves minutes by not re-downloading every day

      # 3. Install the libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run your script
      - name: Run main script
        run: python main.py
